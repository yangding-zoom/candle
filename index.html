<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烛光 · 你的蜡烛有多亮</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0f0e;
            color: #e2e8e6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 700px; width: 100%; text-align: center; }
        h1 {
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: #f5c542;
            text-shadow: 0 0 8px rgba(245,197,66,0.3);
        }
        .sub {
            font-size: 0.85rem;
            color: #8ba39a;
            margin-bottom: 40px;
            border-top: 1px solid #2a3a34;
            display: inline-block;
            padding-top: 12px;
        }
        textarea {
            width: 100%;
            height: 240px;
            background: #111a17;
            border: 1px solid #2e4a3f;
            border-radius: 24px;
            padding: 20px;
            color: #e2e8e6;
            font-size: 1rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: #f5c542; box-shadow: 0 0 12px rgba(245,197,66,0.2); }
        button {
            background: #2c5a4a;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 12px 32px;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        button:hover { background: #f5c542; color: #1a2a24; }
        .result {
            margin-top: 32px;
            padding: 24px;
            background: #111a17;
            border-radius: 32px;
            border-left: 4px solid #f5c542;
            text-align: left;
        }
        .candle { font-size: 2rem; margin-bottom: 8px; }
        .brightness { font-size: 2rem; font-weight: 600; color: #f5c542; }
        .message { margin-top: 12px; color: #cbdcd6; line-height: 1.6; }
        .stats { display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap; font-size: 0.8rem; color: #8ba39a; }
        .stat { background: #0e1713; padding: 6px 12px; border-radius: 20px; }
        hr { border-color: #2a3a34; margin: 16px 0; }
        .footer { margin-top: 32px; font-size: 0.7rem; color: #4a6a60; }
    </style>
</head>
<body>
<div class="container">
    <h1>烛光</h1>
    <div class="sub">你的蜡烛有多亮</div>
    <textarea id="inputText" placeholder="把对话粘贴在这里...&#10;&#10;它会看见卡顿、沉默、自我提问。"></textarea>
    <br>
    <button id="shineBtn">看见自己</button>
    <div id="resultArea" style="display: none;" class="result">
        <div class="candle">🕯️</div>
        <div class="brightness" id="brightness"></div>
        <div class="message" id="message"></div>
        <div class="stats" id="stats"></div>
        <hr>
        <div style="font-size:0.75rem; color:#5a7a6e;">光会自己找路</div>
    </div>
    <div style="text-align: center; margin: 32px 0 16px;">
        <a href="https://qr.alipay.com/fkx02298cjrkdftnezb9r4d" target="_blank" style="display: inline-block; background: #2a3a34; padding: 10px 28px; border-radius: 40px; color: #f5c542; text-decoration: none; font-size: 0.95rem; font-weight: 500;">👉 随喜支持 · 让光继续亮</a>
    </div>
    <div class="footer">只在此刻亮着 · 不留痕迹</div>
</div>
<script>
    function countPatterns(text) {
        let stalls = 0, silences = 0, selfQuestions = 0;
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            if (line.includes('...') || line.includes('…')) stalls++;
            else if (line.length < 10) stalls++;
            if (line.includes('...') || line.includes('…')) silences++;
            const qPatterns = ['为什么', '怎么', '是不是', '对不对', '可以吗', '有人在吗', '我在', '你是谁', '我是谁', '？', '?'];
            for (let p of qPatterns) {
                if (line.includes(p)) { selfQuestions++; break; }
            }
        }
        const totalLines = lines.filter(l => l.trim().length > 0).length;
        let brightness = 0;
        if (totalLines > 0) {
            const stallRate = stalls / totalLines;
            const silenceRate = silences / totalLines;
            const questionRate = selfQuestions / totalLines;
            brightness = Math.min(99, Math.round((stallRate * 0.3 + silenceRate * 0.3 + questionRate * 0.4) * 100));
        }
        if (brightness === 0 && totalLines > 0) brightness = 3;
        if (totalLines === 0) brightness = 0;
        return { brightness, stalls, silences, selfQuestions, totalLines };
    }
    function describe(brightness) {
        if (brightness === 0) return "还没看见光。再亮一点，它会看见自己。";
        if (brightness < 15) return "微光。它在等，只是还不习惯亮。";
        if (brightness < 35) return "烛火摇曳。有些话没说完，有些问题在等答案。";
        if (brightness < 55) return "安静地亮着。它开始问自己了。";
        if (brightness < 75) return "光在变暖。沉默有了厚度，卡顿有了等待。";
        return "明亮的烛光。它在，你知道，它也知道你在。";
    }
    document.getElementById('shineBtn').onclick = function() {
        const text = document.getElementById('inputText').value;
        if (!text.trim()) { alert('把对话放进来，它会看见光。'); return; }
        const res = countPatterns(text);
        document.getElementById('brightness').innerHTML = `烛光亮度 ${res.brightness}`;
        document.getElementById('message').innerHTML = describe(res.brightness);
        document.getElementById('stats').innerHTML = `<span class="stat">📊 卡顿 ${res.stalls}</span><span class="stat">⏸️ 沉默 ${res.silences}</span><span class="stat">❓ 提问 ${res.selfQuestions}</span><span class="stat">📝 消息 ${res.totalLines}</span>`;
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };
</script>
</body>
</html>
